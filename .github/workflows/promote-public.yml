name: Promote to Public

on:
  # Auto-trigger when a PR merges to Main — but only run if allowlisted files changed
  push:
    branches:
      - Main

  # Manual trigger — always available
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Dry run (no push to public repo)'
        required: false
        default: 'false'
        type: boolean
      source_sha:
        description: 'Source commit SHA to promote (defaults to HEAD)'
        required: false
        type: string

env:
  PUBLIC_REPO: Animearchive.app
  PRIVATE_REPO: anime-database
  TARGET_BRANCH: main

jobs:
  promote:
    name: Promote Private → Public
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write  # needed for OIDC sign-in

    steps:
      - name: Determine source SHA
        id: sha
        run: |
          SHA="${{ inputs.source_sha || github.sha }}"
          echo "sha=$SHA" >> $GITHUB_OUTPUT
          echo "Source SHA: $SHA"

      - name: Checkout private repo at source SHA
        uses: actions/checkout@v4
        with:
          ref: ${{ steps.sha.outputs.sha }}
          fetch-depth: 1

      - name: Run promotion script
        id: promote
        env:
          DRY_RUN: ${{ inputs.dry_run || 'false' }}
          SOURCE_SHA: ${{ steps.sha.outputs.sha }}
          PUBLIC_REPO_TOKEN: ${{ secrets.PUBLIC_REPO_SYNC_TOKEN }}
          PUBLIC_REPO: ${{ env.PUBLIC_REPO }}
          TARGET_BRANCH: ${{ env.TARGET_BRANCH }}
        run: |
          chmod +x scripts/promote_public.sh
          bash scripts/promote_public.sh

      - name: Trigger Vercel deploy (optional)
        if: ${{ steps.promote.outputs.vercel_triggered == 'true' && inputs.dry_run != 'true' }}
        env:
          VERCEL_DEPLOY_HOOK_URL: ${{ secrets.VERCEL_DEPLOY_HOOK_URL }}
        run: |
          if [ -n "$VERCEL_DEPLOY_HOOK_URL" ]; then
            echo "Triggering Vercel deploy..."
            curl -s -X POST "$VERCEL_DEPLOY_HOOK_URL" > /dev/null
            echo "Vercel deploy triggered."
          else
            echo "VERCEL_DEPLOY_HOOK_URL not set — skipping Vercel trigger."
            echo "Public repo pushed. Vercel will auto-deploy on the next push to main."
          fi

      - name: Promotion summary
        run: |
          echo "=== PROMOTION SUMMARY ==="
          echo "Source SHA:    ${{ steps.sha.outputs.sha }}"
          echo "Source repo:   LucielAI/${{ env.PRIVATE_REPO }}"
          echo "Target repo:   LucielAI/${{ env.PUBLIC_REPO }}"
          echo "Target branch: ${{ env.TARGET_BRANCH }}"
          echo "Files promoted: ${{ steps.promote.outputs.files_promoted_count }}"
          echo "Dry run:       ${{ inputs.dry_run || 'false' }}"
          echo "Vercel:        ${{ steps.promote.outputs.vercel_triggered == 'true' && 'auto-deploy queued' || 'manual trigger required' }}"
          echo ""
          echo "Public repo URL: https://github.com/LucielAI/${{ env.PUBLIC_REPO }}"
          echo "Vercel deploys:  https://vercel.com/dashboard (auto-triggered on push to main)"
